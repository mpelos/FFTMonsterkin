name: Build and Publish

# Push a version tag (matching ModConfig.json's ModVersion, e.g. "0.1.0") to package the
# Monsterkin mod with the official Reloaded publisher and attach it to a GitHub Release.
# Manual runs (workflow_dispatch) build the package without creating a release.
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

# Reloaded.Publisher.exe (from the official Tools.zip) targets .NET 5; roll it forward onto the
# .NET 9 runtime we install below so the runner doesn't need an EOL SDK.
env:
  DOTNET_ROLL_FORWARD: LatestMajor

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Package (Reloaded Publisher)
        run: ./Publish.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffttic.monsterkin
          path: ./Publish/ToUpload/Generic/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./Publish/ToUpload/Generic/*
          generate_release_notes: true
